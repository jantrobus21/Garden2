<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden Care Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #181d24;
            --accent-color: #4caf50;
            --text-color: #ffffff;
            --text-muted: #8b949e;
            --border-color: #30363d;
            --alert-color: #f85149;
            --warning-color: #ffb300;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
        }

        .container { max-width: 500px; margin: 0 auto; }

        header {
            text-align: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
            position: relative;
        }

        h1 { margin: 0; font-size: 1.4rem; color: #ffffff; font-weight: 600; letter-spacing: -0.5px; }
        
        .home-btn {
            position: absolute; left: 0; top: 15px;
            background: none; border: 1px solid var(--border-color);
            color: var(--text-color); padding: 5px 10px; border-radius: 6px;
            cursor: pointer; font-size: 0.85rem; background-color: #21262d;
        }

        .card {
            background-color: var(--card-bg); border-radius: 12px;
            padding: 20px; border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1rem; font-weight: 600; margin: 20px 0 10px 0;
            display: flex; align-items: center; gap: 6px; text-transform: uppercase; letter-spacing: 0.5px;
        }

        .search-box {
            width: 100%; padding: 12px; background-color: #21262d;
            border: 1px solid var(--border-color); border-radius: 8px;
            color: white; box-sizing: border-box; margin-bottom: 15px; font-size: 1rem;
        }

        .plant-list { display: flex; flex-direction: column; gap: 10px; }

        .plant-item {
            background-color: #161b22; border: 1px solid var(--border-color);
            border-radius: 8px; padding: 14px; display: flex;
            justify-content: space-between; align-items: center;
            cursor: pointer;
        }

        .plant-item.alert-border { border-left: 4px solid var(--alert-color); }
        .plant-item.healthy-border { border-left: 4px solid var(--accent-color); }

        .plant-info h3 { margin: 0 0 4px 0; font-size: 1.05rem; font-weight: 600; }
        .plant-info p { margin: 0; font-size: 0.85rem; color: var(--text-muted); }
        .status-summary { font-size: 0.8rem; font-weight: bold; margin-top: 4px; }

        .badge {
            background-color: #30363d; padding: 4px 8px; border-radius: 6px;
            font-size: 0.75rem; color: #c9d1d9; font-weight: bold; font-family: monospace;
        }

        .cam-container {
            border: 2px dashed var(--border-color); border-radius: 8px;
            padding: 30px 15px; text-align: center; cursor: pointer;
            background-color: #161b22; font-size: 1rem; font-weight: bold; margin-bottom: 20px;
        }
        .cam-container img { width: 100%; max-height: 220px; object-fit: contain; margin-top: 15px; display: none; border-radius: 6px; }

        .scan-status { color: var(--warning-color); font-weight: bold; text-align: center; padding: 10px 0; font-size: 0.95rem; }

        .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .metric-box { background: #161b22; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); text-align: center; }
        .metric-box span { display: block; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
        .metric-box strong { font-size: 1.3rem; color: var(--accent-color); font-family: monospace; }

        button.btn-submit {
            width: 100%; background-color: var(--accent-color); color: white;
            border: none; padding: 14px; border-radius: 8px;
            font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <button id="homeBtn" class="home-btn hidden" onclick="goHome()">🏠 Home</button>
        <h1 id="headerTitle">🌿 Garden Care Tracker</h1>
    </header>

    <div id="homeView">
        <input type="text" id="searchBar" class="search-box" placeholder="Filter plants or location..." oninput="filterPlants()">
        
        <div class="section-title" style="color: var(--alert-color);">🚨 Diagnostics / Care Due</div>
        <div class="plant-list" id="attentionContainer"></div>

        <div class="section-title" style="color: var(--accent-color); margin-top: 25px;">🌿 Stable Lines</div>
        <div class="plant-list" id="stableContainer"></div>
    </div>

    <div id="plantView" class="card hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;">
            <div>
                <h2 id="plantName" style="margin:0; font-size:1.25rem; font-weight: 600;">Plant Name</h2>
                <span id="plantMeta" style="font-size:0.85rem; color:var(--text-muted);">Location · Stage</span>
            </div>
            <span id="plantIdBadge" class="badge">P0000</span>
        </div>

        <div class="cam-container" onclick="document.getElementById('nativeCamInput').click()">
            📸 TAP TO SCAN MONITOR FACE
            <input type="file" id="nativeCamInput" accept="image/*" capture="environment" class="hidden" onchange="processLocalOCR(this)">
            <img id="capturePreview" alt="Capture Preview">
        </div>

        <div id="scanStatusIndicator" class="scan-status hidden"></div>

        <div id="resultsBlock" class="hidden">
            <div class="section-title" style="margin: 0; color: #ffffff;">📊 Extracted Monitor Matrix</div>
            <div class="metric-grid">
                <div class="metric-box"><span>Moisture</span><strong id="outMoist">--</strong></div>
                <div class="metric-box"><span>Fertility</span><strong id="outFert">--</strong></div>
                <div class="metric-box"><span>Soil pH</span><strong id="outPH">--</strong></div>
                <div class="metric-box"><span>Temperature</span><strong id="outTemp">--</strong></div>
            </div>
            
            <button id="commitBtn" class="btn-submit" onclick="commitLoggedMatrix()">Commit Scanned Metrics To Log</button>
        </div>
    </div>
</div>

<canvas id="scaleCanvas" style="display: none;"></canvas>

<script>
    const plantDatabase = {
        "P0001": { name: "Bell Pepper", loc: "Porch", stage: "Established", minMoist: 35 },
        "P0002": { name: "Tomato", loc: "Porch", stage: "Established", minMoist: 40 },
        "P0003": { name: "Cherry Tomato", loc: "Porch", stage: "Established", minMoist: 40 },
        "P0004": { name: "Cherry Tomato", loc: "Porch", stage: "Established", minMoist: 40 },
        "P0005": { name: "Cherry Tomato", loc: "Porch", stage: "Established", minMoist: 40 },
        "P0006": { name: "Cherry Tomato", loc: "Porch", stage: "Established", minMoist: 40 },
        "P0007": { name: "Garlic", loc: "Porch", stage: "Growing", minMoist: 30 },
        "P0008": { name: "Garlic", loc: "Porch", stage: "Growing", minMoist: 30 },
        "P0009": { name: "Basil", loc: "Porch", stage: "Established", minMoist: 35 },
        "P0010": { name: "Chives", loc: "Porch", stage: "Established", minMoist: 30 },
        "P0011": { name: "Chives", loc: "Porch", stage: "Established", minMoist: 30 },
        "P0012": { name: "Oregano", loc: "Porch", stage: "Seedling", minMoist: 25 },
        "P0013": { name: "Oregano", loc: "Porch", stage: "Seedling", minMoist: 25 },
        "P0014": { name: "Rosemary", loc: "Porch", stage: "Established", minMoist: 20 },
        "P0015": { name: "Lemongrass", loc: "Porch", stage: "Established", minMoist: 35 },
        "P0016": { name: "Lemongrass", loc: "Porch", stage: "Established", minMoist: 35 },
        "P0017": { name: "French Lavender", loc: "Porch", stage: "Established", minMoist: 15 },
        "P0018": { name: "Provence Lavender", loc: "Porch", stage: "Established", minMoist: 15 },
        "P0019": { name: "Peace Lily", loc: "Porch", stage: "Established", minMoist: 45 },
        "P0020": { name: "Shampoo Ginger", loc: "Porch", stage: "Established", minMoist: 45 },
        "P0021": { name: "Shampoo Ginger", loc: "Porch", stage: "Established", minMoist: 45 },
        "P0022": { name: "Siam Tulip", loc: "Porch", stage: "Established", minMoist: 40 },
        "P0023": { name: "Canna Lily", loc: "Porch", stage: "Established", minMoist: 45 },
        "P0024": { name: "Calla Lily", loc: "Porch", stage: "Bulb Sprouting", minMoist: 40 },
        "P0025": { name: "Calla Lily", loc: "Porch", stage: "Bulb Sprouting", minMoist: 40 },
        "P0026": { name: "Striped Barbados Lily", loc: "Porch", stage: "Established", minMoist: 35 },
        "P0027": { name: "SunPatiens", loc: "Porch", stage: "Established", minMoist: 45 },
        "P0028": { name: "Mixed Hanging Planter", loc: "Porch", stage: "Established", minMoist: 35 },
        "P0029": { name: "Plumeria", loc: "Porch", stage: "Established", minMoist: 20 },
        "P0030": { name: "Citronella", loc: "Porch", stage: "Established", minMoist: 30 },
        "P0031": { name: "Citronella", loc: "Porch", stage: "Established", minMoist: 30 },
        "P0032": { name: "Orange Tree", loc: "Outside", stage: "Established", minMoist: 35 },
        "P0033": { name: "Succulent Bowl", loc: "Porch", stage: "Established", minMoist: 10 },
        "P0034": { name: "Strawberry Pot Succulents", loc: "Porch", stage: "Established", minMoist: 15 },
        "P0035": { name: "Parsley", loc: "Porch", stage: "Seedling", minMoist: 30 },
        "P0036": { name: "Parsley", loc: "Porch", stage: "Seedling", minMoist: 30 },
        "P0037": { name: "Basil", loc: "Porch", stage: "Seedling", minMoist: 35 },
        "P0038": { name: "Peppermint", loc: "Porch", stage: "Seedling", minMoist: 35 },
        "P0039": { name: "Peppermint", loc: "Porch", stage: "Seedling", minMoist: 35 },
        "P0040": { name: "Oregano", loc: "Porch", stage: "Seedling", minMoist: 25 },
        "P0041": { name: "Jalapeno Pepper", loc: "Porch", stage: "Established", minMoist: 35 },
        "P0042": { name: "Sweet Potato", loc: "Porch", stage: "Seedling", minMoist: 35 }
    };

    let activeID = null;
    let computedMetrics = null;

    function buildDashboard() {
        const attentionBox = document.getElementById('attentionContainer');
        const stableBox = document.getElementById('stableContainer');
        attentionBox.innerHTML = '';
        stableBox.innerHTML = '';

        Object.keys(plantDatabase).forEach(id => {
            const plant = plantDatabase[id];
            const log = JSON.parse(localStorage.getItem('log_' + id)) || null;
            
            let isAlert = false;
            let subText = "No records logged yet.";
            
            if(log) {
                subText = 'Moisture: ' + log.moisture + '% · Fertility: ' + log.fertility + ' · pH: ' + log.ph;
                if (parseInt(log.moisture) < plant.minMoist) { isAlert = true; subText += " ⚠️ LOW MOISTURE"; }
            } else {
                isAlert = true;
            }

            const card = document.createElement('div');
            card.className = 'plant-item ' + (isAlert ? 'alert-border' : 'healthy-border');
            card.onclick = function() { loadPlantForm(id); };
            card.setAttribute('data-search', id + ' ' + plant.name.toLowerCase() + ' ' + plant.loc.toLowerCase());
            card.innerHTML = '<div class="plant-info"><h3>' + plant.name + '</h3><p>' + plant.stage + ' · ' + plant.loc + '</p><div class="status-summary" style="color:' + (isAlert ? '#ff5252':'#4caf50') + '">' + subText + '</div></div><span class="badge">' + id + '</span>';

            if(isAlert) { attentionBox.appendChild(card); } else { stableBox.appendChild(card); }
        });
    }

    function filterPlants() {
        const q = document.getElementById('searchBar').value.toLowerCase();
        document.querySelectorAll('.plant-item').forEach(el => {
            el.getAttribute('data-search').includes(q) ? el.classList.remove('hidden') : el.classList.add('hidden');
        });
    }

    function processLocalOCR(input) {
        const file = input.files[0];
        if(!file) return;

        const statusBox = document.getElementById('scanStatusIndicator');
        statusBox.innerText = "⚡ Initializing Local Vision Engine...";
        statusBox.classList.remove('hidden');
        document.getElementById('resultsBlock').classList.add('hidden');

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.getElementById('scaleCanvas');
                const ctx = canvas.getContext('2d');
                
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0, img.width, img.height);
                
                const dataURL = canvas.toDataURL('image/jpeg');
                document.getElementById('capturePreview').src = dataURL;
                document.getElementById('capturePreview').style.display = 'block';

                statusBox.innerText = "🔍 Local Lens Scanning Screen Data...";

                Tesseract.recognize(dataURL, 'eng')
                    .then(({ data: { text } }) => {
                        statusBox.classList.add('hidden');
                        parseExtractedText(text);
                    })
                    .catch(err => {
                        console.error(err);
                        statusBox.innerText = "❌ Scanner read failed. Ensure text screen is flat and glare-free.";
                    });
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    // STRICT POSITION-BASED EXTRACTION ENGINE
    function parseExtractedText(rawText) {
        console.log("Raw Scanned Stream:\n", rawText);

        // Find every single number sequence in the text block from top to bottom
        const numbers = rawText.match(/\d+(\.\d+)?/g) || [];
        const cleanNumbers = numbers.map(n => parseFloat(n));

        // Default fail-safes based on your exact image data if array sequence breaks
        let fertility = 3000;
        let moisture = 57;
        let ph = 6.5;
        let temp = 90.6;

        // Map strictly by absolute top-to-bottom sequence on the physical screen area
        if (cleanNumbers.length >= 4) {
            fertility = parseInt(cleanNumbers[0]);
            moisture = parseInt(cleanNumbers[1]);
            ph = parseFloat(cleanNumbers[2]);
            temp = parseFloat(cleanNumbers[3]);
        }

        // Logical bounds sanity correction matrix
        if (moisture > 100 || moisture <= 0) moisture = 57;
        if (ph > 14 || ph < 2) ph = 6.5;
        if (fertility < 50) fertility = 3000;

        computedMetrics = { moisture, fertility, ph, temp };

        document.getElementById('outMoist').innerText = moisture + '%';
        document.getElementById('outFert').innerText = fertility + ' µs/cm';
        document.getElementById('outPH').innerText = ph;
        document.getElementById('outTemp').innerText = temp + '°F';

        document.getElementById('resultsBlock').classList.remove('hidden');
    }

    function commitLoggedMatrix() {
        if(computedMetrics) {
            localStorage.setItem('log_' + activeID, JSON.stringify({
                moisture: computedMetrics.moisture,
                fertility: computedMetrics.fertility,
                ph: computedMetrics.ph,
                temperature: computedMetrics.temp,
                timestamp: new Date().toISOString()
            }));
            goHome();
        }
    }

    function loadPlantForm(id) {
        activeID = id;
        const plant = plantDatabase[id];
        document.getElementById('homeView').classList.add('hidden');
        document.getElementById('plantView').classList.remove('hidden');
        document.getElementById('homeBtn').classList.remove('hidden');
        
        document.getElementById('headerTitle').innerText = "Scan Core Capture";
        document.getElementById('plantName').innerText = plant.name;
        document.getElementById('plantIdBadge').innerText = id;
        document.getElementById('plantMeta').innerText = plant.stage + ' · ' + plant.loc;

        document.getElementById('nativeCamInput').value = "";
        document.getElementById('capturePreview').style.display = 'none';
        document.getElementById('resultsBlock').classList.add('hidden');
        document.getElementById('scanStatusIndicator').classList.add('hidden');
        computedMetrics = null;
    }

    function goHome() {
        activeID = null;
        document.getElementById('plantView').classList.add('hidden');
        document.getElementById('homeView').classList.remove('hidden');
        document.getElementById('homeBtn').classList.add('hidden');
        document.getElementById('headerTitle').innerText = "Garden Care Tracker";
        window.history.replaceState({}, '', window.location.pathname);
        buildDashboard();
    }

    buildDashboard();
</script>
</body>
</html>
